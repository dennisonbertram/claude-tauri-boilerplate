# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "claude-tauri-boilerplate"

[setup]
script = '''
set -euo pipefail

cd "$CODEX_WORKTREE_PATH"

if [ ! -f .env ]; then
  cp .env.example .env
fi

if ! grep -q '^DB_DIR=' .env; then
  printf '\nDB_DIR=./data\n' >> .env
fi

unset ANTHROPIC_API_KEY || true

INIT_DAEMONIZE=1 ./init.sh

if [ -f .init-state ]; then
  . ./.init-state
  printf 'Server: %s\nFrontend: %s\n' "$SERVER_URL" "$FRONTEND_URL"
fi
'''

[cleanup]
script = '''
set -euo pipefail

cd "$CODEX_WORKTREE_PATH"

if [ -f .init-state ]; then
  ./init.sh stop || true
fi
'''

[[actions]]
name = "Start env"
icon = "run"
command = "cd \"$CODEX_WORKTREE_PATH\" && INIT_DAEMONIZE=1 ./init.sh"

[[actions]]
name = "Stop env"
icon = "run"
command = "cd \"$CODEX_WORKTREE_PATH\" && ./init.sh stop"

[[actions]]
name = "Show URLs"
icon = "tool"
command = "d \"$CODEX_WORKTREE_PATH\" && test -f .init-state && . ./.init-state && printf 'Server: %s\\nFrontend: %s\\n' \"$SERVER_URL\" \"$FRONTEND_URL\""

[[actions]]
name = "Run Tests"
icon = "tool"
command = "cd \"$CODEX_WORKTREE_PATH\" && pnpm test"

[[actions]]
name = "Desktop Tests"
icon = "tool"
command = "cd \"$CODEX_WORKTREE_PATH\" && pnpm --filter @claude-tauri/desktop test -- --run"

[[actions]]
name = "Server Tests"
icon = "tool"
command = "cd \"$CODEX_WORKTREE_PATH\" && pnpm --filter @claude-tauri/server test"

[[actions]]
name = "Build Sidecare"
icon = "tool"
command = "cd \"$CODEX_WORKTREE_PATH\" && pnpm build:sidecar"
